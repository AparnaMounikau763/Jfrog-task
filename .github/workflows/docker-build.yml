name: Build and Push Docker Image to JFrog

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: my-python-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to JFrog
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JFROG_REGISTRY }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.JFROG_REGISTRY }}/jfrog-task-docker-local/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.JFROG_REGISTRY }}/jfrog-task-docker-local/${{ env.IMAGE_NAME }}:latest
